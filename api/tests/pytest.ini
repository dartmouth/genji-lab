[pytest]
# Pytest configuration for Genji API tests

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = -v --tb=short -W ignore

# Coverage configuration
[coverage:html]
directory = tests/htmlcov

# Markers for categorizing tests
markers =
    unit: Unit tests that do not require external services
    integration: Integration tests that may require database
    slow: Slow running tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::sqlalchemy.exc.MovedIn20Warning
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:The ``declarative_base.*:sqlalchemy.exc.MovedIn20Warning
    ignore:Support for class-based.*:DeprecationWarning
    ignore:Pydantic V1 style.*:DeprecationWarning
