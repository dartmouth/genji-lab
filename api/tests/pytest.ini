[pytest]
# Pytest configuration for Genji API tests

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = -v --tb=short -W ignore::DeprecationWarning -W ignore::sqlalchemy.exc.MovedIn20Warning

# Coverage configuration
[coverage:html]
directory = tests/htmlcov

# Markers for categorizing tests
markers =
    unit: Unit tests that do not require external services
    integration: Integration tests that may require database
    slow: Slow running tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
    ignore::sqlalchemy.exc.MovedIn20Warning
